<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOps App - Cadastro</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @custom-variant dark (&:where(.dark, .dark *));
    </style>
</head>
<body class="bg-slate-50 dark:bg-black text-slate-900 dark:text-zinc-100 flex min-h-screen items-center justify-center p-4 transition-colors duration-300">

    <!-- Botão Flutuante de Dark/Light Mode -->
    <button id="theme-toggle" class="absolute top-4 right-4 p-2.5 rounded-full bg-slate-200 dark:bg-zinc-900 text-slate-600 dark:text-zinc-400 hover:bg-slate-300 dark:hover:bg-zinc-800 transition-colors cursor-pointer shadow-sm border dark:border-zinc-800">
        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
        </svg>
        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path>
        </svg>
    </button>

    <div class="w-full max-w-md bg-white dark:bg-zinc-950 p-8 rounded-2xl shadow-2xl border border-slate-200 dark:border-zinc-800 transition-colors duration-300">
        <h2 class="text-2xl font-bold text-center text-sky-600 dark:text-sky-400 mb-2">Criar Conta</h2>
        <p class="text-slate-500 dark:text-zinc-400 text-sm text-center mb-6">Cadastre-se na plataforma Serverless</p>

        <!-- Feedbacks Visuais -->
        <div id="feedback" class="hidden p-3 rounded-lg text-sm mb-4 text-center font-medium transition-colors"></div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-zinc-400 uppercase tracking-wider mb-1">E-mail / Username</label>
                <input type="email" id="username" required
                       class="w-full bg-slate-50 dark:bg-black border border-slate-300 dark:border-zinc-800 rounded-lg px-4 py-2.5 text-sm text-slate-900 dark:text-zinc-100 focus:outline-none focus:border-sky-500 dark:focus:border-sky-400 transition-colors"
                       placeholder="seu@email.com">
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 dark:text-zinc-400 uppercase tracking-wider mb-1">Senha</label>
                <input type="password" id="password" required
                       class="w-full bg-slate-50 dark:bg-black border border-slate-300 dark:border-zinc-800 rounded-lg px-4 py-2.5 text-sm text-slate-900 dark:text-zinc-100 focus:outline-none focus:border-sky-500 dark:focus:border-sky-400 transition-colors"
                       placeholder="••••••••">
            </div>
            <button type="submit"
                    class="w-full bg-sky-600 hover:bg-sky-500 text-white font-medium py-2.5 rounded-lg text-sm transition-colors shadow-lg shadow-sky-600/20 cursor-pointer block mt-2">
                Cadastrar
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-slate-600 dark:text-zinc-400">
            Já possui cadastro? <a href="index.html" class="text-sky-600 dark:text-sky-400 hover:underline font-medium">Fazer Login</a>
        </div>
    </div>

    <script>
        // === LÓGICA DO DARK/LIGHT MODE ===
        const themeToggleBtn = document.getElementById('theme-toggle');
        const darkIcon = document.getElementById('theme-toggle-dark-icon');
        const lightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'light') {
            document.documentElement.classList.remove('dark');
            darkIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.add('dark');
            lightIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function() {
            darkIcon.classList.toggle('hidden');
            lightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
            }
        });

        // === LÓGICA DA API (CADASTRO) ===
        const API_URL = "https://ib93jqzl51.execute-api.us-east-1.amazonaws.com";

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const feedback = document.getElementById('feedback');

            feedback.className = "p-3 rounded-lg text-sm mb-4 text-center font-medium bg-slate-200 text-slate-700 dark:bg-zinc-900 dark:text-zinc-200 transition-colors border dark:border-zinc-800";
            feedback.innerText = "Processando requisição cloud...";
            feedback.classList.remove('hidden');

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    feedback.className = "p-3 rounded-lg text-sm mb-4 text-center font-medium bg-emerald-100 text-emerald-700 border border-emerald-300 dark:bg-emerald-500/10 dark:text-emerald-400 dark:border-emerald-500/20 transition-colors";
                    feedback.innerText = data.mensagem || "Cadastro realizado com sucesso!";
                    setTimeout(() => { window.location.href = 'index.html'; }, 2000);
                } else {
                    feedback.className = "p-3 rounded-lg text-sm mb-4 text-center font-medium bg-rose-100 text-rose-700 border border-rose-300 dark:bg-rose-500/10 dark:text-rose-400 dark:border-rose-500/20 transition-colors";
                    feedback.innerText = data.erro || "Erro ao realizar cadastro.";
                }
            } catch (error) {
                feedback.className = "p-3 rounded-lg text-sm mb-4 text-center font-medium bg-rose-100 text-rose-700 border border-rose-300 dark:bg-rose-500/10 dark:text-rose-400 dark:border-rose-500/20 transition-colors";
                feedback.innerText = "Erro ao conectar com o API Gateway.";
            }
        });
    </script>
</body>
</html>
