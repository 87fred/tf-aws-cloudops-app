<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 text-white font-sans">

    <!-- 1. Header Global com Busca -->
    <header class="bg-gray-900 border-b border-gray-800 p-4 flex justify-between items-center sticky top-0 z-50">
        <h1 class="text-xl font-bold text-blue-500">CloudOps Console</h1>
        <div class="relative w-96">
            <input type="text" placeholder="Pesquisar recursos (EC2, Lambda, RDS...)" 
                   class="w-full bg-gray-950 border border-gray-700 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 transition">
        </div>
        <div class="text-xs text-gray-400">fred@admin</div>
    </header>

<div class="flex h-screen">
    <aside class="w-64 bg-gray-900 border-r border-gray-800 p-6">
        <nav class="space-y-4">
            <a href="dashboard.html" class="block p-2 bg-gray-800 rounded">📊 Dashboard</a>
            <a href="infrastructure.html" class="block p-2 hover:text-blue-400">🏗️ Infrastructure</a>
            <a href="monitoring.html" class="block p-2 hover:text-blue-400">📈 Monitoring</a>
            <a href="costs.html" class="block p-2 hover:text-blue-400">💰 Costs</a>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <!-- 2. Infrastructure Health (Novo) -->
        <div class="grid grid-cols-2 md:grid-cols-6 gap-4 mb-8">
            <div class="bg-gray-900 p-3 rounded-xl border border-gray-800 flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
                <div><p class="text-[10px] text-gray-500 uppercase">EC2</p><p class="text-xs font-bold">Running</p></div>
            </div>
            <div class="bg-gray-900 p-3 rounded-xl border border-gray-800 flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-green-500"></div>
                <div><p class="text-[10px] text-gray-500 uppercase">ECS</p><p class="text-xs font-bold">Healthy</p></div>
            </div>
            <div class="bg-gray-900 p-3 rounded-xl border border-gray-800 flex items-center gap-3">
                <div class="w-2.5 h-2.5 rounded-full bg-yellow-500"></div>
                <div><p class="text-[10px] text-gray-500 uppercase">Lambda</p><p class="text-xs font-bold">Degraded</p></div>
            </div>
        </div>

        <!-- Cards Superiores (Originais mantidos) -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
             <!-- ... seus cards originais de CPU/Mem/Disp ... -->
        </div>

        <!-- Linha de Gráficos -->
        <div class="grid grid-cols-3 gap-6 mb-8">
             <!-- ... seus gráficos originais ... -->
        </div>

        <!-- 3. Activity Feed e Quick Actions (Substituindo a tabela antiga) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 bg-gray-900 p-6 rounded-xl border border-gray-800">
                <h3 class="text-sm font-bold text-gray-400 mb-6">Activity Feed</h3>
                <div class="space-y-6">
                    <div class="flex gap-4">
                        <div class="w-px bg-gray-700 relative ml-2"><div class="absolute -left-1 w-3 h-3 rounded-full bg-blue-500"></div></div>
                        <div><p class="text-sm">Terraform Apply concluído</p><p class="text-xs text-gray-500">14:30 - Infraestrutura atualizada</p></div>
                    </div>
                </div>
            </div>

            <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                <h3 class="text-sm font-bold text-gray-400 mb-6">Quick Actions</h3>
                <div class="space-y-3">
                    <button class="w-full text-left p-3 rounded-lg border border-gray-700 hover:border-blue-500 transition text-sm">🔄 Refresh Infrastructure</button>
                    <button class="w-full text-left p-3 rounded-lg border border-gray-700 hover:border-blue-500 transition text-sm">🛠️ Terraform Plan</button>
                </div>
            </div>
        </div>
    </main>
</div>
<!-- Seu script Chart.js permanece igual abaixo -->
</body>
</html>
